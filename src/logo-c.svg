<!-- Option C: Integrated — trail triangle IS the bottom of the house, one connected shape -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#2F4F3D"/>

  <!-- Trail wedge in rust/earth tone, wider, taller -->
  <polygon points="32,60 12,64 52,64" fill="#C1542C"/>

  <!-- House outline only, white, sits at top of trail -->
  <!-- Roof -->
  <polygon points="16,33 32,18 48,33" fill="none" stroke="white" stroke-width="2.5"
           stroke-linejoin="round"/>
  <!-- Walls -->
  <rect x="19" y="32" width="26" height="18"
        fill="none" stroke="white" stroke-width="2.5"
        stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="12"
        fill="#2F4F3D" stroke="white" stroke-width="2"/>

  <!-- Small horizontal line connecting trail tip to door — threshold -->
  <line x1="26" y1="50" x2="38" y2="50" stroke="white" stroke-width="2"/>
</svg>
