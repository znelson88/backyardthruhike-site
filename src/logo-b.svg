<!-- Option B: Trail as a winding path (not just wedge), solid house silhouette -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#2F4F3D"/>

  <!-- Winding trail line, tan, from bottom curving up -->
  <path d="M32,64 C28,54 36,46 30,38 C26,33 30,28 32,28"
        stroke="#C7BC9C" stroke-width="7" fill="none"
        stroke-linecap="round"/>

  <!-- House solid white silhouette -->
  <!-- Roof -->
  <polygon points="17,30 32,16 47,30" fill="white"/>
  <!-- Body -->
  <rect x="20" y="29" width="24" height="16" fill="white"/>
  <!-- Door (negative space in forest green) -->
  <rect x="26" y="33" width="12" height="12" rx="1" fill="#2F4F3D"/>
</svg>
