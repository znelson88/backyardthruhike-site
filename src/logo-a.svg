<!-- Option A: Faithful to screenshot — house outline + trail wedge, clean proportions -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#2F4F3D"/>

  <!-- Trail wedge (perspective road/path converging at house) -->
  <polygon points="32,56 16,64 48,64" fill="#C7BC9C"/>

  <!-- House outline, white, clean stroke -->
  <path d="M20,34 L32,20 L44,34 L44,48 L20,48 Z"
        fill="none" stroke="white" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Door cutout -->
  <rect x="26" y="38" width="12" height="10"
        fill="#2F4F3D" stroke="white" stroke-width="2"/>
</svg>
