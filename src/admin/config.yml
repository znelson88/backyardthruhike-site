backend:
  name: github
  repo: znelson88/backyardthruhike-site
  branch: main
  auth_type: pkce
  app_id: Ov23ligS6jWG6HwLq5hI

media_folder: src/images
public_folder: /images

collections:
  - name: blog
    label: Blog Posts
    folder: src/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: Post type
        name: type
        widget: select
        options: ["Observation", "Field note", "Essay", "How-to"]
      - { label: Summary, name: summary, widget: text, hint: "One or two sentences shown on the blog listing and homepage." }
      - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Site Settings
    files:
      - label: Photo Gallery
        name: gallery
        file: src/_data/gallery.json
        fields:
          - label: Photos
            name: photos
            widget: list
            fields:
              - { label: Image, name: src, widget: image }
              - { label: Alt text, name: alt, widget: string, hint: "Describe the image for screen readers." }
              - { label: Caption, name: caption, widget: string }
