backend:
  name: github
  repo: znelson88/backyardthruhike-site
  branch: main
  base_url: https://delicate-butterfly-16f1.znelson88.workers.dev


media_folder: src/images
public_folder: /images

collections:
  - name: blog
    label: Blog Posts
    folder: src/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: Post type
        name: type
        widget: select
        options: ["Observation", "Field note", "Essay", "How-to"]
      - { label: Summary, name: summary, widget: text, hint: "One or two sentences shown on the blog listing and homepage." }
      - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Site Settings
    files:
      - label: Homepage
        name: homepage
        file: src/_data/homepage.json
        fields:
          - { label: Eyebrow text, name: eyebrow, widget: string, hint: "Small line above the headline, e.g. 'Backyard naturalism · est. 2026'" }
          - { label: Headline, name: headline, widget: string, hint: "Main hero headline. Use a newline character (\n) to break the line." }
          - { label: Lede paragraph, name: lede, widget: text }
          - { label: Primary button label, name: cta_primary_label, widget: string }
          - { label: Primary button URL, name: cta_primary_url, widget: string }
          - { label: Secondary button label, name: cta_secondary_label, widget: string }
          - { label: Secondary button URL, name: cta_secondary_url, widget: string }
      - label: Blog page
        name: pageblog
        file: src/_data/pageblog.json
        fields:
          - { label: Eyebrow text, name: eyebrow, widget: string }
          - { label: Headline, name: headline, widget: string }
          - { label: Lede paragraph, name: lede, widget: text }
      - label: Photos page
        name: pagephotos
        file: src/_data/pagephotos.json
        fields:
          - { label: Eyebrow text, name: eyebrow, widget: string }
          - { label: Headline, name: headline, widget: string }
          - { label: Lede paragraph, name: lede, widget: text }
      - label: Library page
        name: pagelibrary
        file: src/_data/pagelibrary.json
        fields:
          - { label: Eyebrow text, name: eyebrow, widget: string }
          - { label: Headline, name: headline, widget: string }
          - { label: Lede paragraph, name: lede, widget: text }
      - label: Photo Gallery
        name: gallery
        file: src/_data/gallery.json
        fields:
          - label: Photos
            name: photos
            widget: list
            fields:
              - { label: Image, name: src, widget: image }
              - { label: Alt text, name: alt, widget: string, hint: "Describe the image for screen readers." }
              - { label: Caption, name: caption, widget: string }
